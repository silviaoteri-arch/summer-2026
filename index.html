function genDays(){
  var days=[];
  var d=new Date("2026-04-01");
  var end=new Date("2027-09-01");
  while(d<end){days.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
  return days;
}
var ALL_DAYS=genDays();

function monthOf(ds){
  var y=ds.slice(0,4);
  var m=parseInt(ds.slice(5,7));
  var name=MONTHS_FULL[m-1];
  // For 2027, prefix with year to distinguish from 2026 same-name months
  return y==="2027"?name+" 2027":name;
}
function dowOf(ds){return new Date(ds+"T12:00:00").getDay();}
function isWeekend(ds){var d=dowOf(ds);return d===0||d===6;}
function dayN(ds){return parseInt(ds.slice(8));}

function buildInitial(){
  var out={};
  ALL_DAYS.forEach(function(d){out[d]=Object.assign({},INITIAL[d]||{});});
  return out;
}

function actColor(val,field){
  if(field==="boat_location"&&val==="GREECE")return"#1976D2";
  return ACTIVITY_COLORS[val]||"#455A64";
}

var DATA={};
var visibleMonths=new Set(ALL_MONTHS); // all always visible
var editingDay=null;
var saveTimer=null;
var CAPTAIN_MODE=window.location.search.indexOf("captain")>=0;

async function fbGet(){
  try{
    var r=await fetch(FIREBASE_URL+"/data.json");
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}
async function fbSet(d){
  try{
    await fetch(FIREBASE_URL+"/data.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});
  }catch(e){}
}

async function init(){
  DATA=buildInitial();
  var remote=await fbGet();
  if(remote&&Object.keys(remote).length>0){
    Object.keys(remote).forEach(function(k){DATA[k]=remote[k];});
  }
  render();
  setInterval(async function(){
    var r=await fbGet();
    if(r&&Object.keys(r).length>0){
      var base=buildInitial();
      Object.keys(r).forEach(function(k){base[k]=r[k];});
      DATA=base;
      render();
    }
  },30000);
}

function persist(){
  document.getElementById("saving").style.display="block";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async function(){
    await fbSet(DATA);
    document.getElementById("saving").style.display="none";
  },800);
}

function getBlocks(days,field){
  var blocks=[];
  var i=0;
  while(i<days.length){
    var val=(DATA[days[i]]||{})[field]||null;
    if(!val){i++;continue;}
    var j=i+1;
    while(j<days.length&&((DATA[days[j]]||{})[field]||null)===val)j++;
    blocks.push({startIdx:i,endIdx:j-1,value:val});
    i=j;
  }
  return blocks;
}

function render(){
  var visibleDays=ALL_DAYS.filter(function(d){return visibleMonths.has(monthOf(d));});
  var totalW=visibleDays.length*COL_W;



  var tl=document.getElementById("timeline");
  tl.innerHTML="";

  // Month boundaries
  var boundaries=[];
  ALL_MONTHS.forEach(function(m){
    if(!visibleMonths.has(m))return;
    var idx=visibleDays.findIndex(function(d){return monthOf(d)===m;});
    if(idx>=0)boundaries.push({month:m,idx:idx});
  });

  // Month header row
  var mhr=document.createElement("div");
  mhr.className="month-header-row";
  boundaries.forEach(function(b,i){
    var nextIdx=i+1<boundaries.length?boundaries[i+1].idx:visibleDays.length;
    var cell=document.createElement("div");
    cell.className="month-label-cell";
    cell.style.width=((nextIdx-b.idx)*COL_W)+"px";
    cell.textContent=b.month;
    mhr.appendChild(cell);
  });
  tl.appendChild(mhr);

  // Day header row
  var dhr=document.createElement("div");
  dhr.className="day-header-row";
  visibleDays.forEach(function(ds){
    var cell=document.createElement("div");
    cell.className="day-cell"+(isWeekend(ds)?" weekend":"")+(dayN(ds)===1?" month-start":"");
    cell.innerHTML='<div class="dow-label">'+DAYS_SHORT[dowOf(ds)]+'</div><div class="day-num">'+dayN(ds)+'</div>';
    cell.onclick=function(){openModal(ds);};
    dhr.appendChild(cell);
  });
  tl.appendChild(dhr);

  // Rows
  var rows=CAPTAIN_MODE?[]:(PEOPLE.map(function(p){return{key:p,label:p,field:p,color:COLORS[p]};}));
  if(!CAPTAIN_MODE){
    rows.push({key:"nina_martino_divider",label:"",field:"",color:""});
    rows.push({key:"Nina",label:"Nina",field:"Nina",color:COLORS["Nina"]});
    rows.push({key:"Martino",label:"Martino",field:"Martino",color:COLORS["Martino"]});
    rows.push({key:"dog_divider",label:"",field:"",color:""});
    rows.push({key:"dog",label:"🐶",field:"dog",color:"#795548"});
  }
  rows.push({key:"boat_divider",label:"",field:"",color:""});
  rows.push({key:"boat_location",label:"🚢 Location",field:"boat_location",color:"#00ACC1"});
  rows.push({key:"boat_use",label:"🚢 Use",field:"boat_use",color:"#00838F"});
  if(!CAPTAIN_MODE){
    rows.push({key:"pietrasanta_divider",label:"",field:"",color:""});
    rows.push({key:"pietrasanta",label:"🏡 Pietrasanta",field:"pietrasanta",color:"#43A047"});
  }

  rows.forEach(function(row,ri){
    // Handle all divider rows
    if(row.key==="nina_martino_divider"||row.key==="dog_divider"||row.key==="boat_divider"||row.key==="pietrasanta_divider"){
      var divColor="rgba(0,0,0,0.1)";
      if(row.key==="boat_divider")divColor="rgba(0,172,193,0.3)";
      if(row.key==="pietrasanta_divider")divColor="rgba(67,160,71,0.3)";
      if(row.key==="nina_martino_divider")divColor="rgba(142,36,170,0.2)";
      if(row.key==="dog_divider")divColor="rgba(121,85,72,0.2)";
      var divEl=document.createElement("div");
      divEl.className="boat-divider";
      divEl.innerHTML='<div class="boat-divider-label" style="background:#e8f4fd"></div><div class="boat-divider-line" style="background:'+divColor+'"></div>';
      tl.appendChild(divEl);
      return;
    }
    var wrap=document.createElement("div");
    wrap.className="row-wrap";

    var label=document.createElement("div");
    label.className="row-label";
    label.style.color=row.color;
    label.textContent=row.label;
    wrap.appendChild(label);

    var track=document.createElement("div");
    track.className="track";
    track.style.width=totalW+"px";

    // Weekend shading - grey hatching on empty, color hatching on blocks handled separately
    visibleDays.forEach(function(ds,i){
      if(isWeekend(ds)){
        var s=document.createElement("div");
        s.className="weekend-shade hatch-grey";
        s.style.left=(i*COL_W)+"px";
        s.style.background="transparent";
        track.appendChild(s);
      }
    });

    // Month dividers
    boundaries.slice(1).forEach(function(b){
      var d=document.createElement("div");
      d.className="month-divider";
      d.style.left=(b.idx*COL_W)+"px";
      track.appendChild(d);
    });

    // Blocks
    getBlocks(visibleDays,row.field).forEach(function(block){
      var x=block.startIdx*COL_W;
      var w=(block.endIdx-block.startIdx+1)*COL_W;
      var el=document.createElement("div");
      el.className="block";
      el.style.left=(x+2)+"px";
      el.style.width=(w-4)+"px";
      var blockColor=actColor(block.value,row.field);
      el.style.background=blockColor;
      if(blockColor==="#29B6F6"||blockColor==="#039BE5"||blockColor==="#0288D1"||blockColor==="#00ACC1"){
        el.classList.add("penguin-bg");
      }
      el.innerHTML='<span>'+block.value+'</span>';
      track.appendChild(el);
    });

    // Weekend hatch overlays on top of blocks
    var blockEls=track.querySelectorAll(".block");
    visibleDays.forEach(function(ds,i){
      if(isWeekend(ds)){
        var hatch=document.createElement("div");
        hatch.className="hatch-color";
        hatch.style.cssText="position:absolute;left:"+(i*COL_W+2)+"px;top:3px;width:"+(COL_W-4)+"px;height:"+(ROW_H-8)+"px;pointer-events:none;z-index:2;border-radius:0";
        track.appendChild(hatch);
      }
    });

    // Click zones
    visibleDays.forEach(function(ds,i){
      var z=document.createElement("div");
      z.className="click-zone";
      z.style.left=(i*COL_W)+"px";
      z.onclick=function(){openModal(ds);};
      track.appendChild(z);
    });

    wrap.appendChild(track);
    tl.appendChild(wrap);
  });

  // Bottom ruler
  var ruler=document.createElement("div");
  ruler.className="bottom-ruler";
  var spacer=document.createElement("div");
  spacer.className="bottom-ruler-spacer";
  ruler.appendChild(spacer);
  visibleDays.forEach(function(ds){
    var cell=document.createElement("div");
    cell.className="ruler-day";
    cell.textContent=dayN(ds);
    ruler.appendChild(cell);
  });
  tl.appendChild(ruler);
}

function openModal(ds){
  editingDay=ds;
  var d=new Date(ds+"T12:00:00");
  document.getElementById("modal-date").textContent=DAYS_FULL[d.getDay()]+", "+MONTHS_FULL[d.getMonth()]+" "+d.getDate();
  var dayData=DATA[ds]||{};

  var pf=document.getElementById("people-fields");
  pf.innerHTML="";
  if(!CAPTAIN_MODE){
    PEOPLE.forEach(function(p){
      var row=document.createElement("div");
      row.className="field-row";
      row.innerHTML='<div class="field-dot" style="background:'+COLORS[p]+'"></div>'
        +'<div class="field-label" style="color:'+COLORS[p]+'">'+p+'</div>'
        +'<input class="field-input" id="field-'+p+'" style="border:1.5px solid '+COLORS[p]+'" placeholder="What is '+p+' doing?" list="dl-person" value="'+(dayData[p]||'')+'">';
      pf.appendChild(row);
    });
  }

  var bf=document.getElementById("boat-fields");
  bf.innerHTML='<div class="field-row">'
    +'<span style="font-size:12px">📍</span>'
    +'<div class="field-label" style="color:#00ACC1">Location</div>'
    +'<input class="field-input" id="field-boat_location" style="border:1.5px solid #00ACC1" placeholder="Where is the boat?" list="dl-boat-location" value="'+(dayData.boat_location||'')+'"></div>'
    +'<div class="field-row">'
    +'<span style="font-size:12px">👥</span>'
    +'<div class="field-label" style="color:#00838F">Using it</div>'
    +'<input class="field-input" id="field-boat_use" style="border:1.5px solid #00838F" placeholder="Who is using it?" list="dl-boat-use" value="'+(dayData.boat_use||'')+'"></div>';

  var ef=document.getElementById("extended-fields");
  if(ef&&!CAPTAIN_MODE){
    ef.innerHTML="";
    EXTENDED.forEach(function(p){
      var row=document.createElement("div");
      row.className="field-row";
      row.innerHTML='<div class="field-dot" style="background:'+COLORS[p]+'"></div>'
        +'<div class="field-label" style="color:'+COLORS[p]+'">'+p+'</div>'
        +'<input class="field-input" id="field-'+p+'" style="border:1.5px solid '+COLORS[p]+'" list="dl-person" placeholder="Where is '+p+'?" value="'+(dayData[p]||'')+'">';
      ef.appendChild(row);
    });
  }
  var df=document.getElementById("dog-fields");
  if(df&&!CAPTAIN_MODE){
    df.innerHTML='<div class="field-row">'
      +'<span style="font-size:12px">🐶</span>'
      +'<div class="field-label" style="color:#795548">Where</div>'
      +'<input class="field-input" id="field-dog" style="border:1.5px solid #795548" list="dl-person" placeholder="Where is the dog?" value="'+(dayData.dog||'')+'"></div>';
  }
  var pff=document.getElementById("pietrasanta-fields");
  if(pff){
    var existingP=(DATA[ds]||{}).pietrasanta||"";
    pff.innerHTML='<div class="field-row">'
      +'<span style="font-size:12px">🏡</span>'
      +'<div class="field-label" style="color:#43A047;width:50px">Using it</div>'
      +'<input class="field-input" id="field-pietrasanta" style="border:1.5px solid #43A047" list="dl-person" placeholder="Who is staying?" value="'+existingP+'"></div>';
  }
  if(CAPTAIN_MODE){
    ["extended-section-label","dog-section-label","pietrasanta-section-label"].forEach(function(id){
      var el=document.getElementById(id);if(el)el.style.display="none";
    });
    ["extended-fields","dog-fields","pietrasanta-fields"].forEach(function(id){
      var el=document.getElementById(id);if(el)el.style.display="none";
    });
  }
  var applyUntilEl=document.getElementById("apply-until");
  if(applyUntilEl)applyUntilEl.value=ds;
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  editingDay=null;
}

function saveDay(){
  if(!editingDay)return;
  var existing=Object.assign({},DATA[editingDay]||{});
  if(!CAPTAIN_MODE){
    var obj={};
    PEOPLE.forEach(function(p){
      var v=document.getElementById("field-"+p).value.trim();
      if(v)obj[p]=v;
    });
    var bl=document.getElementById("field-boat_location").value.trim();
    var bu=document.getElementById("field-boat_use").value.trim();
    if(bl)obj.boat_location=bl;
    if(bu)obj.boat_use=bu;
    DATA[editingDay]=obj;
  } else {
    var bl=document.getElementById("field-boat_location").value.trim();
    var bu=document.getElementById("field-boat_use").value.trim();
    if(bl)existing.boat_location=bl; else delete existing.boat_location;
    if(bu)existing.boat_use=bu; else delete existing.boat_use;
    DATA[editingDay]=existing;
  }
  var pv=document.getElementById("field-pietrasanta");
  if(pv){
    var pvv=pv.value.trim();
    if(!CAPTAIN_MODE){
      if(pvv)DATA[editingDay].pietrasanta=pvv;
      else delete DATA[editingDay].pietrasanta;
    }
  }
  persist();
  closeModal();
  render();
}

function clearDay(){
  if(!editingDay)return;
  DATA[editingDay]={};
  persist();
  closeModal();
  render();
}

document.getElementById("modal-overlay").addEventListener("click",function(e){
  if(e.target===this)closeModal();
});

if(CAPTAIN_MODE){
  document.getElementById("mode-label").textContent="Penguin Family Tracker · Captain View";
  var fl=document.getElementById("family-section-label");
  if(fl)fl.style.display="none";
}
function applyRange(){
  if(!editingDay)return;
  var until=document.getElementById("apply-until").value;
  if(!until||until<editingDay){alert("Please pick an end date on or after "+editingDay);return;}
  
  // First save current day's values into a temp object
  var obj={};
  if(!CAPTAIN_MODE){
    PEOPLE.forEach(function(p){
      var el=document.getElementById("field-"+p);
      if(el){var v=el.value.trim();if(v)obj[p]=v;}
    });
    EXTENDED.forEach(function(p){
      var el=document.getElementById("field-"+p);
      if(el){var v=el.value.trim();if(v)obj[p]=v;}
    });
    var dogEl=document.getElementById("field-dog");
    if(dogEl&&dogEl.value.trim())obj.dog=dogEl.value.trim();
    var pv=document.getElementById("field-pietrasanta");
    if(pv&&pv.value.trim())obj.pietrasanta=pv.value.trim();
  }
  var bl=document.getElementById("field-boat_location");
  var bu=document.getElementById("field-boat_use");
  if(bl&&bl.value.trim())obj.boat_location=bl.value.trim();
  if(bu&&bu.value.trim())obj.boat_use=bu.value.trim();

  // Apply to all days in range
  ALL_DAYS.forEach(function(d){
    if(d>=editingDay&&d<=until){
      if(CAPTAIN_MODE){
        var existing=Object.assign({},DATA[d]||{});
        if(obj.boat_location)existing.boat_location=obj.boat_location;
        else delete existing.boat_location;
        if(obj.boat_use)existing.boat_use=obj.boat_use;
        else delete existing.boat_use;
        if(obj.dog)existing.dog=obj.dog;
        else delete existing.dog;
        DATA[d]=existing;
      } else {
        DATA[d]=Object.assign({},obj);
      }
    }
  });

  persist();
  closeModal();
  render();
}

init();
