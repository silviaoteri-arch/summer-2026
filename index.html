function genDays(){
  var days=[];
  var d=new Date("2026-04-01");
  var end=new Date("2026-09-06");
  while(d<end){days.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
  return days;
}
var ALL_DAYS=genDays();

function monthOf(ds){return MONTHS_FULL[parseInt(ds.slice(5,7))-1];}
function dowOf(ds){return new Date(ds+"T12:00:00").getDay();}
function isWeekend(ds){var d=dowOf(ds);return d===0||d===6;}
function dayN(ds){return parseInt(ds.slice(8));}

function buildInitial(){
  var out={};
  ALL_DAYS.forEach(function(d){out[d]=Object.assign({},INITIAL[d]||{});});
  return out;
}

function actColor(val,field){
  if(field==="boat_location"&&val==="GREECE")return"#1976D2";
  return ACTIVITY_COLORS[val]||"#455A64";
}

async function fbGet(){

    return r.json();
  }catch(e){return null;}
}
async function fbSet(d){
  try{
    await fetch(FIREBASE_URL+"/data.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});
  }catch(e){}
}

async function init(){
  DATA=buildInitial();
  var remote=await fbGet();
  if(remote&&Object.keys(remote).length>0){
    Object.keys(remote).forEach(function(k){DATA[k]=remote[k];});
  }
  render();
  setInterval(async function(){
    var r=await fbGet();
    if(r&&Object.keys(r).length>0){
      var base=buildInitial();
      Object.keys(r).forEach(function(k){base[k]=r[k];});
      DATA=base;
      render();
    }
  },30000);
}

  document.getElementById("saving").style.display="block";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async function(){
    await fbSet(DATA);
    document.getElementById("saving").style.display="none";
  },800);
}

function getBlocks(days,field){
  var blocks=[];
  var i=0;
  while(i<days.length){
    var val=(DATA[days[i]]||{})[field]||null;
    if(!val){i++;continue;}
    var j=i+1;
    while(j<days.length&&((DATA[days[j]]||{})[field]||null)===val)j++;
    blocks.push({startIdx:i,endIdx:j-1,value:val});
    i=j;
  }
  return blocks;
}

function render(){
  var visibleDays=ALL_DAYS.filter(function(d){return visibleMonths.has(monthOf(d));});
  var totalW=visibleDays.length*COL_W;

  // Month toggles
  var mt=document.getElementById("month-toggles");
  mt.innerHTML='<span class="month-label">Months</span>';
  ALL_MONTHS.forEach(function(m){
    var b=document.createElement("button");
    b.className="mbtn"+(visibleMonths.has(m)?" active":"");
    b.textContent=m;
    b.onclick=function(){
      if(visibleMonths.has(m))visibleMonths.delete(m);else visibleMonths.add(m);
      render();
    };
    mt.appendChild(b);
  });

  var tl=document.getElementById("timeline");
  tl.innerHTML="";

  // Month boundaries
  var boundaries=[];
  ALL_MONTHS.forEach(function(m){
    if(!visibleMonths.has(m))return;
    var idx=visibleDays.findIndex(function(d){return monthOf(d)===m;});
    if(idx>=0)boundaries.push({month:m,idx:idx});
  });

  // Month header row
  var mhr=document.createElement("div");
  mhr.className="month-header-row";
  boundaries.forEach(function(b,i){
    var nextIdx=i+1<boundaries.length?boundaries[i+1].idx:visibleDays.length;
    var cell=document.createElement("div");
    cell.className="month-label-cell";
    cell.style.width=((nextIdx-b.idx)*COL_W)+"px";
    cell.textContent=b.month;
    mhr.appendChild(cell);
  });
  tl.appendChild(mhr);

  // Day header row
  var dhr=document.createElement("div");
  dhr.className="day-header-row";
  visibleDays.forEach(function(ds){
    var cell=document.createElement("div");
    cell.className="day-cell"+(isWeekend(ds)?" weekend":"")+(dayN(ds)===1?" month-start":"");
    cell.innerHTML='<div class="dow-label">'+DAYS_SHORT[dowOf(ds)]+'</div><div class="day-num">'+dayN(ds)+'</div>';
    cell.onclick=function(){openModal(ds);};
    dhr.appendChild(cell);
  });
  tl.appendChild(dhr);

  // Rows
  var rows=CAPTAIN_MODE?[]:(PEOPLE.map(function(p){return{key:p,label:p,field:p,color:COLORS[p]};}));
  rows.push({key:"boat_location",label:"🚢 Location",field:"boat_location",color:"#00ACC1"});
  rows.push({key:"boat_use",label:"🚢 Use",field:"boat_use",color:"#00838F"});
  rows.push({key:"pietrasanta_divider",label:"",field:"",color:""});
  rows.push({key:"pietrasanta",label:"🏡 Pietrasanta",field:"pietrasanta",color:"#43A047"});

  rows.forEach(function(row,ri){
    if(ri===PEOPLE.length){
      var div=document.createElement("div");
      div.className="boat-divider";
      div.innerHTML='<div class="boat-divider-label"></div><div class="boat-divider-line" style="background:rgba(0,172,193,0.2)"></div>';
      tl.appendChild(div);
    }
    if(row.key==="pietrasanta_divider"){
      var div2=document.createElement("div");
      div2.className="boat-divider";
      div2.innerHTML='<div class="boat-divider-label"></div><div class="boat-divider-line" style="background:rgba(67,160,71,0.3)"></div>';
      tl.appendChild(div2);
      return;
    }
    var wrap=document.createElement("div");
    wrap.className="row-wrap";

    var label=document.createElement("div");
    label.className="row-label";
    label.style.color=row.color;
    label.textContent=row.label;
    wrap.appendChild(label);

    var track=document.createElement("div");
    track.className="track";
    track.style.width=totalW+"px";

    // Weekend shading
    visibleDays.forEach(function(ds,i){
      if(isWeekend(ds)){
        var s=document.createElement("div");
        s.className="weekend-shade";
        s.style.left=(i*COL_W)+"px";
        track.appendChild(s);
      }
    });

    // Month dividers
    boundaries.slice(1).forEach(function(b){
      var d=document.createElement("div");
      d.className="month-divider";
      d.style.left=(b.idx*COL_W)+"px";
      track.appendChild(d);
    });

    // Blocks
    getBlocks(visibleDays,row.field).forEach(function(block){
      var x=block.startIdx*COL_W;
      var w=(block.endIdx-block.startIdx+1)*COL_W;
      var el=document.createElement("div");
      el.className="block";
      el.style.left=(x+2)+"px";
      el.style.width=(w-4)+"px";
      el.style.background=actColor(block.value,row.field);
      el.innerHTML='<span>'+block.value+'</span>';
      track.appendChild(el);
    });

    // Click zones
    visibleDays.forEach(function(ds,i){
      var z=document.createElement("div");
      z.className="click-zone";
      z.style.left=(i*COL_W)+"px";
      z.onclick=function(){openModal(ds);};
      track.appendChild(z);
    });

    wrap.appendChild(track);
    tl.appendChild(wrap);
  });

  // Bottom ruler
  var ruler=document.createElement("div");
  ruler.className="bottom-ruler";
  var spacer=document.createElement("div");
  spacer.className="bottom-ruler-spacer";
  ruler.appendChild(spacer);
  visibleDays.forEach(function(ds){
    var cell=document.createElement("div");
    cell.className="ruler-day";
    cell.textContent=dayN(ds);
    ruler.appendChild(cell);
  });
  tl.appendChild(ruler);
}

function openModal(ds){
  editingDay=ds;
  var d=new Date(ds+"T12:00:00");
  document.getElementById("modal-date").textContent=DAYS_FULL[d.getDay()]+", "+MONTHS_FULL[d.getMonth()]+" "+d.getDate();
  var dayData=DATA[ds]||{};

  var pf=document.getElementById("people-fields");
  pf.innerHTML="";
  if(!CAPTAIN_MODE){
    PEOPLE.forEach(function(p){
      var row=document.createElement("div");
      row.className="field-row";
      row.innerHTML='<div class="field-dot" style="background:'+COLORS[p]+'"></div>'
        +'<div class="field-label" style="color:'+COLORS[p]+'">'+p+'</div>'
        +'<input class="field-input" id="field-'+p+'" style="border:1.5px solid '+COLORS[p]+'" placeholder="What is '+p+' doing?" list="dl-person" value="'+(dayData[p]||'')+'">';
      pf.appendChild(row);
    });
  }

  var bf=document.getElementById("boat-fields");
  bf.innerHTML='<div class="field-row">'
    +'<span style="font-size:12px">📍</span>'
    +'<div class="field-label" style="color:#00ACC1">Location</div>'
    +'<input class="field-input" id="field-boat_location" style="border:1.5px solid #00ACC1" placeholder="Where is the boat?" list="dl-boat-location" value="'+(dayData.boat_location||'')+'"></div>'
    +'<div class="field-row">'
    +'<span style="font-size:12px">👥</span>'
    +'<div class="field-label" style="color:#00838F">Using it</div>'
    +'<input class="field-input" id="field-boat_use" style="border:1.5px solid #00838F" placeholder="Who is using it?" list="dl-boat-use" value="'+(dayData.boat_use||'')+'"></div>';

  var pff=document.getElementById("pietrasanta-fields");
  if(pff){
    var existingP=(DATA[ds]||{}).pietrasanta||"";
    pff.innerHTML='<div class="field-row">'
      +'<span style="font-size:12px">🏡</span>'
      +'<div class="field-label" style="color:#43A047;width:50px">Using it</div>'
      +'<input class="field-input" id="field-pietrasanta" style="border:1.5px solid #43A047" list="dl-person" placeholder="Who is staying?" value="'+existingP+'"></div>';
  }
  if(CAPTAIN_MODE&&document.getElementById("pietrasanta-section-label")){
    document.getElementById("pietrasanta-section-label").style.display="none";
    if(pff)pff.style.display="none";
  }
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  editingDay=null;
}

function saveDay(){
  if(!editingDay)return;
  var existing=Object.assign({},DATA[editingDay]||{});
  if(!CAPTAIN_MODE){
    var obj={};
    PEOPLE.forEach(function(p){
      var v=document.getElementById("field-"+p).value.trim();
      if(v)obj[p]=v;
    });
    var bl=document.getElementById("field-boat_location").value.trim();
    var bu=document.getElementById("field-boat_use").value.trim();
    if(bl)obj.boat_location=bl;
    if(bu)obj.boat_use=bu;
    DATA[editingDay]=obj;
  } else {
    var bl=document.getElementById("field-boat_location").value.trim();
    var bu=document.getElementById("field-boat_use").value.trim();
    if(bl)existing.boat_location=bl; else delete existing.boat_location;
    if(bu)existing.boat_use=bu; else delete existing.boat_use;
    DATA[editingDay]=existing;
  }
  var pv=document.getElementById("field-pietrasanta");
  if(pv){
    var pvv=pv.value.trim();
    if(!CAPTAIN_MODE){
      if(pvv)DATA[editingDay].pietrasanta=pvv;
      else delete DATA[editingDay].pietrasanta;
    }
  }
  persist();
  closeModal();
  render();
}

function clearDay(){
  if(!editingDay)return;
  DATA[editingDay]={};
  persist();
  closeModal();
  render();
}

document.getElementById("modal-overlay").addEventListener("click",function(e){
  if(e.target===this)closeModal();
});

if(CAPTAIN_MODE){
  document.getElementById("mode-label").textContent="Penguins · Summer 2026 · Captain View";
  var fl=document.getElementById("family-section-label");
  if(fl)fl.style.display="none";
}
init();
</script>
