function generateDays() {
const days = [];
for (let d = new Date(“2026-04-01”); d <= new Date(“2026-09-05”); d.setDate(d.getDate() + 1))
days.push(d.toISOString().slice(0, 10));
return days;
}
const ALL_DAYS = generateDays();
const ALL_MONTHS = [“April”, “May”, “June”, “July”, “August”, “September”];
function monthOf(ds) {
const m = parseInt(ds.slice(5,7));
return [””,””,””,””,“April”,“May”,“June”,“July”,“August”,“September”][m];
}
function dow(ds) { return new Date(ds + “T12:00:00”).getDay(); }
function isWeekend(ds) { const d = dow(ds); return d === 0 || d === 6; }
function dayN(ds) { return parseInt(ds.slice(8)); }
function dowShort(ds) { return [“Su”,“Mo”,“Tu”,“We”,“Th”,“Fr”,“Sa”][dow(ds)]; }
function dowFull(ds) { return [“Sunday”,“Monday”,“Tuesday”,“Wednesday”,“Thursday”,“Friday”,“Saturday”][dow(ds)]; }

function buildInitial() {
const out = {};
ALL_DAYS.forEach(d => { out[d] = Object.assign({}, INITIAL[d] || {}); });
return out;
}

// Simple contiguous block finder for one field across a list of days
function getBlocks(days, getValue) {
const blocks = [];
let i = 0;
while (i < days.length) {
const val = getValue(days[i]);
if (!val) { i++; continue; }
let j = i + 1;
while (j < days.length && getValue(days[j]) === val) j++;
blocks.push({ startIdx: i, endIdx: j - 1, value: val });
i = j;
}
return blocks;
}

const FIREBASE_URL = “https://summer-2026-eed9c-default-rtdb.firebaseio.com”;

async function fbGet() {
const res = await fetch(FIREBASE_URL + “/data.json”);
if (!res.ok) return null;
return res.json();
}
async function fbSet(data) {
await fetch(FIREBASE_URL + “/data.json”, {
method: “PUT”,
headers: { “Content-Type”: “application/json” },
body: JSON.stringify(data),
});
}

function App() {
const [data, setData] = useState(null);
const [visibleMonths, setVisibleMonths] = useState(new Set(ALL_MONTHS));
const [editing, setEditing] = useState(null);
const [draft, setDraft] = useState({});
const [saving, setSaving] = useState(false);
const saveTimer = useRef(null);

useEffect(() => {
async function load() {
const init = buildInitial();
try {
const remote = await fbGet();
setData(remote && Object.keys(remote).length > 0 ? Object.assign({}, init, remote) : init);
} catch { setData(init); }
}
load();
const interval = setInterval(async () => {
try {
const remote = await fbGet();
if (remote && Object.keys(remote).length > 0)
setData(() => (Object.assign({}, buildInitial(), remote)));
} catch {}
}, 30000);
return () => clearInterval(interval);
}, []);

async function persist(nd) {
setSaving(true);
clearTimeout(saveTimer.current);
saveTimer.current = setTimeout(async () => {
try { await fbSet(nd); } catch {}
setSaving(false);
}, 800);
}

function toggleMonth(m) {
setVisibleMonths(prev => { const n = new Set(prev); n.has(m) ? n.delete(m) : n.add(m); return n; });
}
function openEdit(ds) { setDraft(Object.assign({}, data[ds] || {})); setEditing(ds); }
function saveEdit() { const nd = Object.assign({}, data, {[editing]: Object.assign({}, draft)}); setData(nd); persist(nd); setEditing(null); }
function clearDay() { const nd = Object.assign({}, data, {[editing]: {}}); setData(nd); persist(nd); setEditing(null); }

            color: visibleMonths.has(m) ? "#0d2333" : "rgba(255,255,255,0.35)",
            fontWeight: visibleMonths.has(m) ? 700 : 400, transition:"all 0.15s",
          }}>{m}</button>
        ))}
      </div>
    </div>
  </div>

  {/* ── Timeline ── */}
  <div style={{ maxWidth:1300, margin:"0 auto", padding:"24px 0 60px" }}>
    {/* Scroll container — only the track area scrolls horizontally */}
    <div style={{ overflowX:"auto", paddingBottom:12 }}>
      <div style={{ minWidth: LABEL_W + totalW + 2, position:"relative" }}>

        {/* Month headers row */}
        <div style={{ display:"flex" }}>
          {/* Sticky label spacer */}
          <div style={{ width:LABEL_W, flexShrink:0, position:"sticky", left:0, zIndex:10, background:"#0b1a27" }} />
          {/* Month labels */}
          <div style={{ display:"flex", flex:1 }}>
            {monthBoundaries.map(({ month, idx }, i) => {
              const nextIdx = i + 1 < monthBoundaries.length ? monthBoundaries[i+1].idx : visibleDays.length;
              return (
                <div key={month} style={{
                  width:(nextIdx - idx) * COL_W, flexShrink:0,
                  padding:"4px 0 3px 8px", fontSize:11, fontWeight:700,
                  color:"#F5D98E", letterSpacing:2, textTransform:"uppercase",
                  borderLeft:"2px solid rgba(245,217,142,0.3)",
                }}>{month}</div>
              );
            })}
          </div>
        </div>

        {/* Day numbers row */}
        <div style={{ display:"flex", borderBottom:"1px solid rgba(255,255,255,0.08)", paddingBottom:4, marginBottom:8 }}>
          {/* Sticky label spacer */}
          <div style={{ width:LABEL_W, flexShrink:0, position:"sticky", left:0, zIndex:10, background:"#0b1a27" }} />
          {/* Day cells */}
          <div style={{ display:"flex" }}>
            {visibleDays.map((ds) => (
              <div key={ds} onClick={() => openEdit(ds)} style={{
                width:COL_W, flexShrink:0, textAlign:"center", cursor:"pointer",
                borderLeft: dayN(ds) === 1 ? "2px solid rgba(245,217,142,0.3)" : "none",
                paddingTop:3,
              }}>
                <div style={{ fontSize:8, color:"rgba(255,255,255,0.22)", marginBottom:1 }}>{dowShort(ds)}</div>
                <div style={{
                  fontSize:10, fontWeight: isWeekend(ds) ? 700 : 400,
                  color: isWeekend(ds) ? "#F5D98E" : "rgba(255,255,255,0.4)",
                  background: isWeekend(ds) ? "rgba(245,217,142,0.1)" : "transparent",
                  borderRadius:3, lineHeight:"17px",
                }}>{dayN(ds)}</div>
              </div>
            ))}
          </div>
        </div>

        {/* One row per person + boat rows */}
        {rows.map((row, ri) => {
          const blocks = getBlocks(visibleDays, d => data[d]?.[row.field] || null);
          const isBoatDivider = ri === PEOPLE.length;

          return (
            <div key={row.key}>
              {/* Divider before boat rows */}
              {isBoatDivider && (
                <div style={{ display:"flex", alignItems:"center", margin:"10px 0 10px" }}>
                  <div style={{ width:LABEL_W, flexShrink:0, position:"sticky", left:0, zIndex:10, background:"#0b1a27" }} />
                  <div style={{ flex:1, height:1, background:"rgba(0,172,193,0.2)" }} />
                </div>
              )}

              <div style={{ display:"flex", alignItems:"center", marginBottom:ROW_GAP, height:ROW_H }}>
                {/* Sticky label */}
                <div style={{
                  width:LABEL_W, flexShrink:0,
                  position:"sticky", left:0, zIndex:10,
                  background:"#0b1a27",
                  paddingRight:10, textAlign:"right",
                  fontSize:12, fontWeight:700, color: row.color,
                  letterSpacing:0.3, whiteSpace:"nowrap",
                  height:ROW_H, display:"flex", alignItems:"center", justifyContent:"flex-end",
                }}>
                  {row.label}
                </div>

                {/* Track */}
                <div style={{ position:"relative", width:totalW, height:ROW_H, flexShrink:0 }}>
                  <TrackBackground />

                  {/* Activity blocks */}
                  {blocks.map((block, bi) => {
                    const x = block.startIdx * COL_W;
                    const w = (block.endIdx - block.startIdx + 1) * COL_W;
                    const bg = activityColor(block.value, row.field);
                    return (
                      <div key={bi} style={{
                        position:"absolute",
                        left: x + 2, top: 3,
                        width: w - 4, height: ROW_H - 8,
                        borderRadius: 5,
                        background: bg,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        overflow:"hidden",
                        boxShadow:"0 2px 8px rgba(0,0,0,0.3)",
                        pointerEvents:"none",
                      }}>
                        <span style={{
                          fontSize:11, fontWeight:700, color:"#fff",
                          whiteSpace:"nowrap", overflow:"hidden",
                          textOverflow:"ellipsis", maxWidth:"92%",
                          textAlign:"center", letterSpacing:0.3,
                        }}>
                          {block.value}
                        </span>
                      </div>
                    );
                  })}

                  {/* Click zones */}
                  {visibleDays.map((ds, i) => (
                    <div key={ds} onClick={() => openEdit(ds)} style={{
                      position:"absolute", left:i*COL_W, top:0,
                      width:COL_W, height:"100%",
                      cursor:"pointer", zIndex:2,
                    }} />
                  ))}
                </div>
              </div>
            </div>
          );
        })}

        {/* Bottom ruler */}
        <div style={{ display:"flex", marginTop:8, borderTop:"1px solid rgba(255,255,255,0.05)" }}>
          <div style={{ width:LABEL_W, flexShrink:0, position:"sticky", left:0, zIndex:10, background:"#0b1a27" }} />
          {visibleDays.map(ds => (
            <div key={ds} style={{ width:COL_W, flexShrink:0, textAlign:"center", paddingTop:4 }}>
              <div style={{ fontSize:8, color:"rgba(255,255,255,0.12)" }}>{dayN(ds)}</div>
            </div>
          ))}
        </div>

      </div>
    </div>
  </div>

  {/* ── Edit Modal ── */}
  {editing && (
    <div onClick={e => { if (e.target === e.currentTarget) setEditing(null); }}
      style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.78)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ background:"#132534", borderRadius:14, width:"100%", maxWidth:420, boxShadow:"0 24px 60px rgba(0,0,0,0.6)", overflow:"hidden", border:"1px solid rgba(245,217,142,0.12)" }}>
        <div style={{ background:"linear-gradient(135deg,#1a3a4a,#0d2333)", padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ color:"#F5D98E", fontSize:9, letterSpacing:3, textTransform:"uppercase", marginBottom:2 }}>
              {dowFull(editing)}, {monthOf(editing)} {dayN(editing)}
            </div>
            <div style={{ color:"#fff", fontSize:15 }}>Edit Day</div>
          </div>
          <button onClick={() => setEditing(null)} style={{ background:"rgba(255,255,255,0.08)", border:"none", color:"#fff", borderRadius:"50%", width:26, height:26, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
        </div>

        <div style={{ padding:"14px 20px" }}>
          <div style={{ fontSize:9, letterSpacing:2, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", marginBottom:8 }}>Family</div>
          <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:16 }}>
            {PEOPLE.map(p => (
              <div key={p} style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:COLORS[p], flexShrink:0 }} />
                <label style={{ width:38, fontSize:12, color:COLORS[p], fontWeight:700 }}>{p}</label>
                <input
                  value={draft[p] || ""}
                  onChange={e => setDraft(v => Object.assign({}, v, {[p]: e.target.value}))}
                  placeholder={`What is ${p} doing?`}
                  style={{ flex:1, border:`1.5px solid ${COLORS[p]}`, borderRadius:6, padding:"5px 8px", fontSize:12, background:"rgba(255,255,255,0.04)", color:"#fff", fontFamily:"Georgia,serif", outline:"none" }}
                />
              </div>
            ))}
          </div>

          <div style={{ fontSize:9, letterSpacing:2, color:"rgba(255,255,255,0.3)", textTransform:"uppercase", marginBottom:8 }}>🚢 Penguins</div>
          <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:18 }}>
            {[
              ["boat_location", BOAT_LOC_BG, "📍", "Location", "Where is the boat?"],
              ["boat_use",      BOAT_USE_BG, "👥", "Using it",  "Who's using it?"],
            ].map(([key, col, icon, label, ph]) => (
              <div key={key} style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:12 }}>{icon}</span>
                <label style={{ width:50, fontSize:12, color:col, fontWeight:700 }}>{label}</label>
                <input
                  value={draft[key] || ""}
                  onChange={e => setDraft(v => Object.assign({}, v, {[key]: e.target.value}))}
                  placeholder={ph}
                  style={{ flex:1, border:`1.5px solid ${col}`, borderRadius:6, padding:"5px 8px", fontSize:12, background:"rgba(255,255,255,0.04)", color:"#fff", fontFamily:"Georgia,serif", outline:"none" }}
                />
              </div>
            ))}
          </div>

          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <button onClick={clearDay} style={{ padding:"6px 12px", borderRadius:6, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"rgba(255,255,255,0.35)", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}>Clear</button>
            <button onClick={() => setEditing(null)} style={{ padding:"6px 12px", borderRadius:6, border:"1px solid rgba(255,255,255,0.1)", background:"transparent", color:"rgba(255,255,255,0.55)", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}>Cancel</button>
            <button onClick={saveEdit} style={{ padding:"6px 16px", borderRadius:6, border:"none", background:"linear-gradient(135deg,#F5D98E,#E6C84A)", color:"#0d2333", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }}>Save</button>
          </div>
        </div>
      </div>
    </div>
  )}
</div>
```

);

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App />);
</script>
